# LiteLLM proxy — litellm.malakoff.com.my → 127.0.0.1:4000
# PUBLIC EDGE: inference only. /v1/* + health are exposed; the admin UI/API
# (/ui, /sso, /key, /spend, /model, /user, /team, /global) are NOT reachable
# from the internet. The ollama_mgmt portal manages LiteLLM via 127.0.0.1:4000
# (localhost), which bypasses this block. Reuses the wildcard cert.
server {
    listen 80;
    server_name litellm.malakoff.com.my;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name litellm.malakoff.com.my;

    ssl_certificate     /home/nms_admin/ollama_mgmt/wildcard.malakoff.com.my_2026/wildcard.malakoff.com.my_2026_fullchain.crt;
    ssl_certificate_key /home/nms_admin/ollama_mgmt/wildcard.malakoff.com.my_2026/wildcard.malakoff.com.my_2026.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # OpenAI-compatible inference endpoints (chat, completions, embeddings, models).
    location /v1 {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;     # SSE streaming
        proxy_cache        off;
    }

    # Liveness for monitoring.
    location = /health/liveliness {
        proxy_pass http://127.0.0.1:4000;
    }

    # Everything else (UI, SSO, admin API) is not exposed publicly.
    location / {
        return 404;
    }
}
