# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name ollama_dev.malakoff.com.my;
    return 301 https://$host$request_uri;
}

# ── HTTPS + port 8443 (direct access without nginx on 80) ─────────────────────
server {
    listen 443 ssl http2;
    listen 8443 ssl http2;   # also available on 8443 for API-key clients
    server_name ollama_dev.malakoff.com.my;

    ssl_certificate     /home/nms_admin/ollama_mgmt/wildcard.malakoff.com.my_2026/wildcard.malakoff.com.my_2026_fullchain.crt;
    ssl_certificate_key /home/nms_admin/ollama_mgmt/wildcard.malakoff.com.my_2026/wildcard.malakoff.com.my_2026.key;

    # Modern TLS only
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — tells browsers to always use HTTPS (1 year)
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # React SPA static files (served directly by nginx – fast)
    root /home/nms_admin/ollama_mgmt/frontend/dist;
    index index.html;

    # OpenAI-compatible inference → LiteLLM gateway (:4000).
    # ^~ so this wins over the regex below. Single domain: no litellm subdomain.
    location ^~ /v1 {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;     # SSE streaming
        proxy_cache        off;
    }

    # API, WebSocket, and Ollama proxy → FastAPI portal backend
    location ~ ^/(api|ollama|ws|ssl-cert) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;     # Required for SSE + WebSocket streaming
        proxy_cache        off;
    }

    # SPA fallback — all unmatched paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
